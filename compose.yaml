services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: zbrothers-app
    working_dir: /var/www
    user: "${UID}:${GID}"
    volumes:
      - ./:/var/www
    depends_on:
      - postgres

  nginx:
    image: nginx:1.27-alpine
    container_name: zbrothers-nginx
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app

  postgres:
    image: postgres:17-alpine
    container_name: zbrothers-postgres
    environment:
      POSTGRES_DB: ${DB_DATABASE}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  node:
    image: node:22-alpine
    container_name: zbrothers-node
    working_dir: /var/www
    volumes:
      - ./:/var/www
    tty: true

volumes:
  postgres_data:
